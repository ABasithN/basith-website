<!DOCTYPE html>

<meta name="description" content="Traces of ordinary lives, from around the world.">

<!-- Link-preview thumbnail for WhatsApp, Twitter/X, iMessage, etc.
     Replace this URL with the real hosted path once deployed,
     e.g. https://yourdomain.com/humans-og-image.png -->

<style>
  :root { color-scheme: light only; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #ffffff; overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    touch-action: none;
    color: #201c1a;
  }
  #stars {
    position: fixed; inset: 0; z-index: 0;
  }

  #stage {
    position: fixed; inset: 0; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }

  #titlecard {
    position: fixed; inset: 0; z-index: 6;
    display: flex; align-items: center; justify-content: center;
    background: #ffffff;
  }
  #titlecard .letter {
    font-size: 2rem; letter-spacing: 0.05em;
    color: rgba(32,28,26,0); display: inline-block;
    transition: color 1.4s ease;
  }
  #titlecard.in .letter { color: rgba(32,28,26,0.85); }
  #titlecard .letter.u { color: rgba(20,110,120,0.95) !important; }
  #titlecard.fading { background: rgba(255,255,255,0); transition: background 1s ease; }

  #uMark {
    position: fixed; top: 16px; left: 22px; z-index: 9;
    font-size: 2rem; color: rgba(20,110,120,0);
    cursor: pointer; transition: color 1.2s ease;
    font-style: italic;
    perspective: 320px;
    padding: 10px 14px; margin: -10px -14px; /* generous tap target, invisible */
  }
  #uMark.show { color: rgba(20,110,120,0.85); }
  #uMark:hover { color: rgba(20,110,120,1); }
  #uSpin {
    display: inline-block;
    transform-style: preserve-3d;
    animation: uFloat 5.6s ease-in-out infinite;
  }
  @keyframes uFloat {
    0%   { transform: translateY(0)    rotateY(0deg); }
    25%  { transform: translateY(-7px) rotateY(90deg); }
    50%  { transform: translateY(0)    rotateY(180deg); }
    75%  { transform: translateY(-7px) rotateY(270deg); }
    100% { transform: translateY(0)    rotateY(360deg); }
  }

  .fragment {
    position: absolute;
    text-align: center; max-width: 480px; padding: 0 28px;
    opacity: 0; transform: translateY(14px);
    transition: opacity 1.1s ease, transform 1.1s ease;
  }
  .fragment.active { opacity: 1; transform: translateY(0); }
  .fragment.leaving { opacity: 0; transform: translateY(-14px); }
  .fragment-text {
    font-size: 1.5rem; line-height: 1.55; font-weight: 400; letter-spacing: 0.01em;
  }
  .fragment-loc {
    display: block; margin-top: 14px; font-size: 0.68rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(20,110,120,0.85);
  }

  #dots {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 4; display: flex; gap: 8px; opacity: 0;
    transition: opacity 0.4s ease;
  }
  #dots.show { opacity: 1; }
  #dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(32,28,26,0.4);
    animation: dotPulse 1.1s ease-in-out infinite;
  }
  #dots span:nth-child(2) { animation-delay: 0.15s; }
  #dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.25; transform: scale(0.85); }
    50% { opacity: 0.9; transform: scale(1); }
  }

  #shareBtn {
    position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%);
    z-index: 8; padding: 6px 12px; cursor: pointer;
    border: none;
    font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(32,28,26,0.75); opacity: 0; transition: opacity 0.8s ease, color 0.3s ease;
  }
  #shareBtn.show { opacity: 1; }
  #shareBtn:hover { color: rgba(20,110,120,0.95); }

  #hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 8; color: rgba(32,28,26,0.32); font-size: 0.65rem;
    letter-spacing: 0.2em; text-transform: uppercase; opacity: 0;
    transition: opacity 2s ease;
  }

  #toast {
    position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
    z-index: 12; background: rgba(32,28,26,0.92); padding: 10px 18px;
    border-radius: 4px; font-size: 0.72rem; letter-spacing: 0.05em;
    color: rgba(255,255,255,0.95); opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #toast.show { opacity: 1; }
</style>

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const FRAGMENTS = shuffle(RAW_FRAGMENTS);

// ---- starfield ----
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function sizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((window.innerWidth * window.innerHeight) / 6000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.1 + 0.2, base: Math.random() * 0.35 + 0.15,
      phase: Math.random() * Math.PI * 2, speed: Math.random() * 0.0006 + 0.0002,
    });
  }
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);
function drawStars() {
  const t = performance.now();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000000';
  stars.forEach((s) => {
    const tw = s.base + Math.sin(t * s.speed + s.phase) * 0.18;
    ctx.globalAlpha = Math.max(0, tw);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ---- title: "humans" scatters down to "u" on first input ----
const titlecard = document.getElementById('titlecard');
const uMark = document.getElementById('uMark');
"humans".split('').forEach((ch) => {
  const span = document.createElement('span');
  span.className = 'letter' + (ch === 'u' ? ' u' : '');
  span.textContent = ch;
  titlecard.appendChild(span);
});
let introActive = true;
let titleDismissed = false;

function dismissTitle() {
  if (titleDismissed) return;
  titleDismissed = true;
  const letters = titlecard.querySelectorAll('.letter');
  letters.forEach((el) => {
    if (el.classList.contains('u')) {
      el.style.transition = 'transform 1.1s ease, opacity 1.1s ease';
      el.style.transform = 'scale(0.4) translate(-620%, -540%)';
    } else {
      const dx = (Math.random() - 0.5) * 500;
      const dy = (Math.random() - 0.5) * 300;
      const rot = (Math.random() - 0.5) * 160;
      el.style.transition = 'transform 0.9s ease, opacity 0.9s ease';
      el.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
      el.style.opacity = '0';
    }
  });
  setTimeout(() => {
    titlecard.classList.add('fading');
    setTimeout(() => {
      titlecard.remove();
      uMark.classList.add('show');
      introActive = false;
      renderFragment(index);
      shareBtn.classList.add('show');
      document.getElementById('hint').style.opacity = 1;
      setTimeout(() => { document.getElementById('hint').style.opacity = 0; }, 4200);
    }, 900);
  }, 950);
}
setTimeout(() => { titlecard.classList.add('in'); }, 200);
uMark.addEventListener('click', () => location.reload());

// ---- fragment stage ----
const stage = document.getElementById('stage');
const dots = document.getElementById('dots');
const shareBtn = document.getElementById('shareBtn');
let index = 0;
let currentEl = null;
let animating = false;
let renderToken = 0;

async function renderFragment(i) {
  const myToken = ++renderToken;
  animating = true;
  const f = FRAGMENTS[i];

  if (currentEl) {
    const leaving = currentEl;
    leaving.classList.add('leaving');
    leaving.classList.remove('active');
    setTimeout(() => leaving.remove(), 1150);
    currentEl = null;
  }

  dots.classList.add('show');
  await new Promise((r) => setTimeout(r, 550));
  if (myToken !== renderToken) return; // a newer call took over — don't create a stale fragment
  dots.classList.remove('show');

  const el = document.createElement('div');
  el.className = 'fragment';
  el.innerHTML = `<span class="fragment-text">${f.text}</span><span class="fragment-loc">${f.loc}</span>`;
  stage.appendChild(el);
  requestAnimationFrame(() => el.classList.add('active'));
  currentEl = el;

  setTimeout(() => { if (myToken === renderToken) animating = false; }, 300);
}

function next() {
  if (animating || introActive) return;
  index = (index + 1) % FRAGMENTS.length;
  renderFragment(index);
}

// ---- input: tap or click anywhere advances to the next fragment ----
// (the very first tap/click, wherever it lands, also dismisses the title)
function handlePrimaryInput(e) {
  if (e.target.closest('#shareBtn') || e.target.closest('#uMark')) return;
  if (introActive) { dismissTitle(); return; }
  next();
}
window.addEventListener('click', handlePrimaryInput);
window.addEventListener('touchend', (e) => {
  if (!e.changedTouches.length) return;
  if (e.target.closest('#shareBtn') || e.target.closest('#uMark')) return; // let those buttons handle their own tap
  e.preventDefault(); // stop the browser's follow-up synthetic click from double-firing navigation
  handlePrimaryInput(e);
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (introActive) { dismissTitle(); return; }
  if (['ArrowRight', 'ArrowDown', 'ArrowLeft', 'ArrowUp', ' '].includes(e.key)) next();
});

// ---- share: generates a plain 1080x1080 image, uses the device share sheet ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function wrapCanvasText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  words.forEach((w) => {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

async function buildShareImage(fragment) {
  const size = 1080;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const cx = c.getContext('2d');

  cx.fillStyle = '#ffffff';
  cx.fillRect(0, 0, size, size);

  // faint static dots — ink-on-paper, matching the live starfield
  let seed = 42;
  function rnd() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
  cx.fillStyle = '#000000';
  for (let i = 0; i < 140; i++) {
    cx.globalAlpha = 0.10 + rnd() * 0.22;
    cx.beginPath();
    cx.arc(rnd() * size, rnd() * size, rnd() * 1.2 + 0.3, 0, Math.PI * 2);
    cx.fill();
  }
  cx.globalAlpha = 1;

  cx.textAlign = 'center';
  cx.fillStyle = 'rgba(32,28,26,0.92)';
  cx.font = '52px Georgia, serif';
  const lines = wrapCanvasText(cx, fragment.text, 780);
  const lineHeight = 68;
  const startY = size/2 - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((line, i) => cx.fillText(line, size/2, startY + i * lineHeight));

  cx.fillStyle = 'rgba(20,110,120,0.85)';
  cx.font = '24px Georgia, serif';
  cx.fillText(fragment.loc.toUpperCase(), size/2, startY + lines.length * lineHeight + 46);

  cx.fillStyle = 'rgba(20,110,120,0.6)';
  cx.font = 'italic 22px Georgia, serif';
  cx.fillText('u', size/2, size - 60);

  return new Promise((resolve) => c.toBlob(resolve, 'image/png'));
}

shareBtn.addEventListener('click', async () => {
  const fragment = FRAGMENTS[index];
  const blob = await buildShareImage(fragment);
  const file = new File([blob], 'humans-fragment.png', { type: 'image/png' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: 'humans', text: fragment.text });
      return;
    } catch (e) { /* user cancelled or share failed, fall through to download */ }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'humans-fragment.png';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('image saved — share it from your files');
});
</script>
